<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign up to Cipher Schools to access notes and lectures.">
    <link rel="stylesheet" href="./style.css" type="text/css" />
    <title>Cipher Schools — Sign Up</title>
</head>

<body>
    <div class="container">
        <p class="brand">Cipher Schools</p>
        <h1>Create your account</h1>
        <p class="subtitle">Sign up to access all important notes &amp; lectures.</p>

        <form action="/addUser" method="POST" target="_blank" id="signupForm">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="user@email.com" name="email" required>
            </div>
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="User Name" name="username" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" name="password" required>
            </div>

            <button id="formBtn" type="submit">Create Account</button>
        </form>

        <p class="footer-note">By signing up, you agree to our terms of service.</p>
    </div>
</body>

</html>
